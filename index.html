<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NADO LIBYA - منظومة الجرد الاحترافية</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="main-container">
        <header class="no-print">
            <h1 class="logo">NADO LIBYA 👕</h1>
            <div class="inventory-info-header">
                <input type="text" id="inventoryTitle" placeholder="اسم الجرد (مثلاً: جرد شهر 4)">
                <select id="branchSelect" onchange="toggleCustomBranch()">
                    <option value="بنغازي">فرع بنغازي 📍</option>
                    <option value="جرابة">فرع جرابة 📍</option>
                    <option value="حي الأندلس">فرع حي الأندلس 📍</option>
                    <option value="custom">فرع آخر (إدخال يدوي)...</option>
                </select>
                <input type="text" id="customBranch" placeholder="اكتب اسم الفرع هنا" style="display:none;">
            </div>
        </header>

        <section class="entry-section glass no-print">
            <div class="input-group">
                <input type="text" id="itemCode" placeholder="كود القطعة 🏷️">
                <input type="text" id="itemName" placeholder="اسم القطعة 👗">
                <input type="number" id="sysQty" placeholder="الكمية بالمنظومة">
                <input type="number" id="phyQty" placeholder="الكمية بالمحل">
                <button onclick="addToInventory()" class="btn-add">إضافة للجرد +</button>
            </div>
        </section>

        <div class="actions no-print">
            <button onclick="generatePDF()" class="btn-pdf">تحميل تقرير PDF 📥</button>
            <button onclick="window.print()" class="btn-print">طباعة مباشرة 🖨️</button>
        </div>

        <div id="reportArea">
            <div class="report-print-header">
                <div class="company-logo-print">NADO LIBYA</div>
                <div class="report-meta">
                    <h2 id="displayTitle">تقرير الجرد العام</h2>
                    <p id="displayBranch">الفرع: بنغازي</p>
                    <p id="displayDate"></p>
                </div>
            </div>

            <table class="inventory-table">
                <thead>
                    <tr>
                        <th>كود القطعة</th>
                        <th>اسم القطعة</th>
                        <th>كمية المنظومة</th>
                        <th>كمية المحل</th>
                        <th>الفرق (عجز/زيادة)</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
